<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Días sin Accidentes — Aceros AZA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rojo: #C8102E;
    --rojo-dark: #960c22;
    --acero: #7B8FA1;
    --acero-light: #B0BEC5;
    --gold: #E8C14A;
    --verde: #2ECC8A;
    --blanco: #F4F2EE;
    --bg: #0D1117;
    --bg2: #141922;
    --bg3: #1C2535;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  /* Fondo con textura de acero */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 120px,
        rgba(255,255,255,0.013) 120px,
        rgba(255,255,255,0.013) 121px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.008) 80px,
        rgba(255,255,255,0.008) 81px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Luz ambiental roja arriba izquierda */
  body::after {
    content: '';
    position: fixed;
    top: -120px; left: -80px;
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(200,16,46,0.22) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-br {
    position: fixed;
    bottom: -100px; right: -60px;
    width: 420px; height: 350px;
    background: radial-gradient(ellipse, rgba(46,204,138,0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Línea roja superior */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rojo-dark), var(--rojo), var(--rojo-dark));
    z-index: 10;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 28px 48px 24px;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-badge {
    width: 52px; height: 52px;
    background: var(--rojo);
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .logo-badge svg {
    width: 28px; height: 28px;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--blanco);
    letter-spacing: 0.04em;
  }

  .logo-sub {
    font-size: 11px;
    font-weight: 400;
    color: var(--acero-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    text-align: right;
  }

  .clock-date {
    font-size: 13px;
    color: var(--acero);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .clock-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--blanco);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  /* ─── CENTRO ─── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
  }

  .label-top {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 300;
    color: var(--acero-light);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .number-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .number-bg {
    position: absolute;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(220px, 32vw, 340px);
    font-weight: 700;
    color: rgba(255,255,255,0.025);
    line-height: 1;
    user-select: none;
    pointer-events: none;
    letter-spacing: -8px;
  }

  .number {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(160px, 26vw, 280px);
    font-weight: 600;
    line-height: 1;
    letter-spacing: -4px;
    color: var(--verde);
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
    transition: color 1.2s ease;
  }

  .label-bottom {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(22px, 4vw, 48px);
    font-weight: 400;
    color: var(--blanco);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 0px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
  }

  /* Línea decorativa */
  .deco-line {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 20px 0;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  .deco-line::before,
  .deco-line::after {
    content: '';
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--rojo));
  }
  .deco-line::after {
    background: linear-gradient(90deg, var(--rojo), transparent);
  }

  .deco-diamond {
    width: 8px; height: 8px;
    background: var(--rojo);
    transform: rotate(45deg);
  }

  /* Frase motivacional */
  .frase-wrap {
    max-width: 680px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
  }

  .frase {
    font-size: clamp(15px, 2vw, 21px);
    font-weight: 300;
    color: var(--acero-light);
    font-style: italic;
    line-height: 1.5;
    letter-spacing: 0.02em;
    text-align: center;
    transition: opacity 0.8s ease;
  }

  .frase.fade-out { opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .frase.fade-in  { opacity: 1; transform: translateY(0);   transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s; }

  /* ─── FOOTER ─── */
  footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }

  .stats {
    display: flex;
    gap: 32px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--acero);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--blanco);
    letter-spacing: 0.04em;
  }

  .stat-value.record {
    color: var(--gold);
  }

  /* Barra de progreso meta */
  .meta-wrap {
    flex: 1;
    max-width: 320px;
  }

  .meta-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .meta-label {
    font-size: 10px;
    color: var(--acero);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .meta-pct {
    font-size: 10px;
    color: var(--acero-light);
    letter-spacing: 0.05em;
  }

  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rojo), var(--gold));
    border-radius: 2px;
    transition: width 1s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -3px;
    width: 9px; height: 9px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
  }

  /* Botones admin */
  .admin-btn {
    position: fixed;
    bottom: 16px; right: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    letter-spacing: 0.06em;
    z-index: 20;
  }

  /* Modal admin */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 32px;
    width: 380px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .modal h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--blanco);
    letter-spacing: 0.06em;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    color: var(--acero-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--blanco);
    font-size: 14px;
    font-family: 'Barlow', sans-serif;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--rojo);
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .modal-btns button {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--acero-light);
    transition: background 0.15s;
  }

  .modal-btns button:hover { background: rgba(255,255,255,0.08); }

  .modal-btns .btn-primary {
    background: var(--rojo);
    border-color: var(--rojo);
    color: white;
    font-weight: 500;
  }

  .modal-btns .btn-primary:hover { background: var(--rojo-dark); }

  .divider-modal {
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(200,16,46,0.3);
    color: #f09595;
    font-size: 12px;
    font-family: 'Barlow', sans-serif;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    width: 100%;
  }

  .reset-btn:hover { background: rgba(200,16,46,0.1); }

  /* Animaciones */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="top-bar"></div>
<div class="glow-br"></div>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <div class="logo-badge">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14 L14 4 L24 14 L14 24 Z" stroke="white" stroke-width="1.8" fill="rgba(255,255,255,0.12)"/>
          <path d="M9 14 L13 18 L20 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Aceros AZA</span>
        <span class="logo-sub">Área Laminación Colina</span>
      </div>
    </div>
    <div class="header-right">
      <div class="clock-date" id="clock-date">—</div>
      <div class="clock-time" id="clock-time">—</div>
    </div>
  </header>

  <!-- CENTRO -->
  <div class="center">
    <div class="label-top">Llevamos</div>

    <div class="number-wrap">
      <div class="number-bg" id="number-bg">0</div>
      <div class="number" id="day-count">0</div>
    </div>

    <div class="label-bottom">Días sin accidentes</div>

    <div class="deco-line">
      <div class="deco-diamond"></div>
    </div>

    <div class="frase-wrap">
      <div class="frase fade-in" id="frase-text">Cargando...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Último accidente</span>
        <span class="stat-value" id="last-date">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Récord histórico</span>
        <span class="stat-value record" id="record-val">—</span>
      </div>
    </div>

    <div class="meta-wrap">
      <div class="meta-header">
        <span class="meta-label">Meta anual</span>
        <span class="meta-pct" id="meta-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </footer>
</div>

<!-- Botón admin (discreto) -->
<button class="admin-btn" onclick="openModal()">⚙ Administrar</button>

<!-- Modal admin -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Configuración</h2>

    <div class="field">
      <label>Fecha del último accidente</label>
      <input type="date" id="input-date" />
    </div>

    <div class="field">
      <label>Meta de días sin accidentes</label>
      <input type="number" id="input-meta" value="365" min="1" max="3650" />
    </div>

    <div class="modal-btns">
      <button onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardar()">Guardar</button>
    </div>

    <div class="divider-modal"></div>

    <button class="reset-btn" onclick="resetear()">
      Reiniciar contador (nuevo accidente hoy)
    </button>
  </div>
</div>

<script>
// ─── Frases motivacionales ───────────────────────────────────────────────────
const FRASES = [
  "No es un día más sin accidentes — es un día más que todos volvemos a casa.",
  "La seguridad no es una regla. Es el respeto que nos tenemos los unos a los otros.",
  "Cada día que cuidamos este número cuidamos a nuestras familias.",
  "Trabajamos juntos. Nos cuidamos juntos. Volvemos juntos.",
  "Un equipo que se cuida es un equipo que dura.",
  "El acero más fuerte es el que forjamos con responsabilidad y cuidado.",
  "Prevenir no es miedo. Es inteligencia y amor por los tuyos.",
  "Tu seguridad es la prioridad de todos. La de todos es tu responsabilidad.",
  "Cada turno seguro es una victoria que vale más que cualquier cifra.",
  "Llegar sano a casa es el objetivo más importante de este trabajo.",
  "El orgullo de AZA se mide también en días sin accidentes.",
  "Un ambiente seguro no se hereda, se construye entre todos cada día.",
  "Trabajar con cuidado no te hace más lento — te hace indispensable.",
  "Que este número siga creciendo es el mejor indicador de que nos importamos.",
  "Seguridad no es solo seguir normas — es hacer bien lo que hacemos siempre.",
  "Cada mañana que llegamos aquí sanos es una victoria que vale celebrar.",
  "Somos acero: fuertes, resistentes y juntos irrompibles.",
  "El mejor momento para pensar en seguridad es antes de que algo pase.",
  "Cuidarte en el trabajo es cuidar el futuro de los tuyos.",
  "Los días seguros no son suerte — son el resultado de elegir bien cada vez.",
  "Un entorno seguro es el regalo más grande que podemos darnos como equipo.",
  "No hay producción que valga más que traer de vuelta a todos los tuyos.",
  "La seguridad empieza contigo y protege a todos los que trabajan a tu lado.",
  "Aquí forjamos más que acero: forjamos confianza, cuidado y familia.",
  "Un día más juntos, un día más seguros, un día más orgullosos de AZA.",
];

// Seleccionar frase del día (cambia cada día pero no es aleatoria)
function getFraseDelDia() {
  const hoy = new Date();
  const dia = Math.floor((hoy - new Date(hoy.getFullYear(), 0, 0)) / 86400000);
  return FRASES[dia % FRASES.length];
}

// ─── Estado ──────────────────────────────────────────────────────────────────
const KEY_DATE   = 'aza_accidente_fecha';
const KEY_META   = 'aza_meta';
const KEY_RECORD = 'aza_record';

let startDate = null;
let meta = 365;
let record = 0;

function loadState() {
  try {
    const d = localStorage.getItem(KEY_DATE);
    if (d) startDate = new Date(d);
    else    { startDate = new Date(); startDate.setHours(0,0,0,0); saveState(); }
    meta   = parseInt(localStorage.getItem(KEY_META))   || 365;
    record = parseInt(localStorage.getItem(KEY_RECORD)) || 0;
  } catch(e) {
    startDate = new Date();
    startDate.setHours(0,0,0,0);
  }
}

function saveState() {
  try {
    localStorage.setItem(KEY_DATE,   startDate.toISOString());
    localStorage.setItem(KEY_META,   meta);
    localStorage.setItem(KEY_RECORD, record);
  } catch(e) {}
}

function getDays() {
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.max(0, Math.floor((now - startDate) / 86400000));
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const days = getDays();

  // Número
  document.getElementById('day-count').textContent = days;
  document.getElementById('number-bg').textContent = days;

  // Color según progreso
  const num = document.getElementById('day-count');
  if      (days >= 365) num.style.color = '#E8C14A'; // oro
  else if (days >= 100) num.style.color = '#2ECC8A'; // verde
  else if (days >= 30)  num.style.color = '#5DCAA5'; // verde suave
  else                  num.style.color = '#7BA8CC'; // azul acero

  // Récord
  if (days > record) { record = days; saveState(); }
  document.getElementById('record-val').textContent =
    record > 0 ? record + ' días' : '—';

  // Fecha último accidente
  document.getElementById('last-date').textContent =
    startDate.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });

  // Progreso meta
  const pct = Math.min(100, Math.round((days / meta) * 100));
  document.getElementById('meta-pct').textContent = pct + '% de ' + meta + ' días';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderClock() {
  const now = new Date();
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
}

function renderFrase() {
  const el = document.getElementById('frase-text');
  el.classList.remove('fade-in');
  el.classList.add('fade-out');
  setTimeout(() => {
    el.textContent = getFraseDelDia();
    el.classList.remove('fade-out');
    el.classList.add('fade-in');
  }, 550);
}

// ─── Modal admin ─────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('input-date').value =
    startDate.toISOString().split('T')[0];
  document.getElementById('input-meta').value = meta;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function guardar() {
  const dateVal = document.getElementById('input-date').value;
  const metaVal = parseInt(document.getElementById('input-meta').value);

  if (dateVal) {
    const d = new Date(dateVal + 'T00:00:00');
    if (!isNaN(d)) startDate = d;
  }
  if (metaVal > 0) meta = metaVal;
  saveState();
  render();
  closeModal();
}

function resetear() {
  if (!confirm('¿Confirmas que ocurrió un accidente hoy y quieres reiniciar el contador?')) return;
  startDate = new Date();
  startDate.setHours(0,0,0,0);
  record = 0;
  saveState();
  render();
  closeModal();
}

// ─── Init ────────────────────────────────────────────────────────────────────
loadState();
render();
renderClock();
renderFrase();

setInterval(render,     60000);
setInterval(renderClock, 1000);

// Cambio de frase cada hora (si la pantalla lleva mucho tiempo abierta)
setInterval(renderFrase, 3600000);
</script>
</body>
</html>
